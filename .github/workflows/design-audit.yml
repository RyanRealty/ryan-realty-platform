name: Design System Audit

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  design-audit:
    name: Design Token & Brand Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run design system audit
        run: node scripts/design-audit.js